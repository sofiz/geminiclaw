<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA / Mobile Web App Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Antigravity">
    <link rel="apple-touch-icon" href="/pwa-icon.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(registration) {
                    console.log('SW registered on login page: ', registration.scope);
                }).catch(function(err) {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>

    <title>Login | Gemini Claw</title>
    
    <!-- Google Fonts: Plus Jakarta Sans & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        brand: {
                            dark: '#070A13',
                            card: 'rgba(15, 23, 42, 0.45)',
                            border: 'rgba(255, 255, 255, 0.08)',
                            emerald: '#10B981',
                            cyan: '#06B6D4',
                            violet: '#8B5CF6',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        html, body {
            height: 100% !important;
            height: var(--vv-height, 100dvh) !important;
            overflow-y: auto !important;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Glassmorphism card standard */
        .glass-card {
            background: rgba(15, 22, 42, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease-in-out;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(6, 182, 212, 0.4);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
            outline: none;
        }

        /* Background glow filters */
        .ambient-glow-cyan {
            background: radial-gradient(circle, rgba(6, 182, 212, 0.14) 0%, rgba(0,0,0,0) 70%);
        }
        .ambient-glow-violet {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(0,0,0,0) 70%);
        }

        /* Custom slide up animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-login-card {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-brand-dark text-slate-100 font-sans h-screen h-[100dvh] relative overflow-hidden select-none flex items-center justify-center">

    <!-- Ambient glowing backgrounds -->
    <div class="absolute w-[600px] h-[600px] rounded-full top-[-10%] left-[-10%] ambient-glow-cyan pointer-events-none z-0"></div>
    <div class="absolute w-[700px] h-[700px] rounded-full bottom-[-15%] right-[-10%] ambient-glow-violet pointer-events-none z-0"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full top-[30%] right-[20%] ambient-glow-cyan/40 pointer-events-none z-0"></div>

    <div class="relative z-10 w-full max-w-md px-6 animate-login-card">
        
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <div class="inline-flex w-14 h-14 rounded-2xl bg-gradient-to-tr from-emerald-500 to-cyan-500 items-center justify-center shadow-lg shadow-emerald-500/20 mb-4">
                <i data-lucide="infinity" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-xl font-black tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-100 to-slate-400">
                ANTIGRAVITY ORCHESTRATOR
            </h1>
            <p class="text-[10px] text-slate-500 font-mono tracking-widest uppercase mt-1">Autonomous Command Console Security Gateway</p>
        </div>

        <!-- Glassmorphic Login Card -->
        <div class="glass-card rounded-3xl p-8 relative overflow-hidden">
            <div class="absolute w-full h-[1px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent top-0 left-0"></div>
            
            <h2 class="text-md font-bold tracking-wide text-slate-200 mb-6 flex items-center">
                <i data-lucide="shield-check" class="w-4 h-4 mr-2 text-cyan-400"></i>
                Gateway Authorization Required
            </h2>

            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <!-- Display generic authentication errors -->
                {% if form.non_field_errors %}
                <div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-xs flex items-start space-x-2.5 animate-pulse">
                    <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0 mt-0.5"></i>
                    <div>
                        {% for error in form.non_field_errors %}
                            <p class="font-medium">{{ error }}</p>
                        {% endfor %}
                    </div>
                </div>
                {% endif %}

                <!-- Username Input -->
                <div>
                    <label for="id_username" class="text-[10px] text-slate-400 font-semibold uppercase block mb-1.5 tracking-wider">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </span>
                        <input type="text" name="username" id="id_username" required placeholder="Enter orchestrator username" 
                               class="w-full text-xs text-white pl-10 pr-4 py-3 rounded-xl glass-input placeholder-slate-600 font-mono" />
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label for="id_password" class="text-[10px] text-slate-400 font-semibold uppercase block mb-1.5 tracking-wider">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" name="password" id="id_password" required placeholder="Enter secure credentials" 
                               class="w-full text-xs text-white pl-10 pr-4 py-3 rounded-xl glass-input placeholder-slate-600 font-mono" />
                    </div>
                </div>

                <!-- hidden next parameter for redirects -->
                <input type="hidden" name="next" value="{{ next }}" />

                <!-- Submit Button -->
                <button type="submit" 
                        class="w-full bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 text-white font-bold py-3.5 px-4 rounded-xl border border-emerald-500/20 hover:border-emerald-500/40 shadow-lg shadow-emerald-500/10 hover:shadow-emerald-500/20 transition-all duration-300 flex items-center justify-center space-x-2 text-xs uppercase tracking-widest mt-2 cursor-pointer">
                    <span>Authorize Link</span>
                    <i data-lucide="key-round" class="w-4 h-4"></i>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-[9px] text-slate-600 font-mono mt-8 uppercase tracking-widest">
            link type: secure session / aes-256
        </p>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Dynamic visual viewport height adjustment for mobile keyboards
        function initVisualViewport() {
            const vv = window.visualViewport;
            if (vv) {
                const handleResize = () => {
                    const height = vv.height;
                    document.documentElement.style.setProperty('--vv-height', `${height}px`);
                };
                vv.addEventListener('resize', handleResize);
                vv.addEventListener('scroll', handleResize);
                window.addEventListener('load', handleResize);
                handleResize();
            }
        }
        initVisualViewport();
    </script>
</body>
</html>
